databaseChangeLog:
  - changeSet:
      id: 003-create-account-table
      author: system
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_account
                    nullable: false
              - column:
                  name: status_id
                  type: INT
                  constraints:
                    foreignKeyName: account_status
                    referencedTableName: pk_account_status
                    nullable: false
              - column:
                  name: client_id
                  type: uuid
                  constraints:
                    foreignKeyName: client
                    referencedTableName: pk_client
                    nullable: false
              - column:
                  name: account_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: currency_code
                  type: varchar(30)
                  constraints:
                    nullable: false