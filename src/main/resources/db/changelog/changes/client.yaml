databaseChangeLog:
  - changeSet:
      id: 002-create-client-table
      author: system
      changes:
        - createTable:
            tableName: client
            columns:
              - column:
                 name: id
                 type: uuid
                 defaultValueComputed: gen_random_uuid()
                 constraints:
                   primaryKey: true
                   primaryKeyName: pk_client
                   nullable: false
              - column:
                  name: full_name
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: citizenship
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: client_type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: document_number
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: document_series
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: mdm_code
                  type: BIGINT
                  constraints:
                    nullable: false