spring:
  liquibase:
    change-log: classpath:db/changelog/master.yaml
  application:
    name: ms-account-reservation
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: "health, threaddump"
  endpoint:
    shutdown:
      access: none
server:
  shutdown: graceful
  port: 8080
